<div class="flex flex-col gap-4">
    <h2 class="text-text-main-light dark:text-white text-lg font-bold flex items-center gap-3">
        <span
            class="flex items-center justify-center w-8 h-8 rounded-full bg-white dark:bg-surface-card border border-border-light dark:border-border-dark text-primary text-sm font-bold shadow-sm">2</span>
        Estilo do Template
    </h2>

    <!-- Templates Verticais (9:16) -->
    @if (isVertical) {
    <div class="grid grid-cols-2 gap-4">
        <!-- Template Vertical 1: Faixa Vermelha -->
        <label class="cursor-pointer group relative template-card">
            <input class="peer sr-only" name="template" type="radio" [checked]="selectedTemplateId === 'faixa-vermelha'"
                (change)="templateSelected.emit('faixa-vermelha')" />
            <div
                class="relative overflow-hidden rounded-xl border-2 border-border-light dark:border-border-dark peer-checked:border-primary transition-all bg-white dark:bg-surface-card">
                <div class="template-preview aspect-[9/16] bg-cover bg-center opacity-90 peer-checked:opacity-100 transition-opacity"
                    data-alt="Template Faixa Vermelha"
                    style='background-image: url("assets/images/template-faixa-vermelha.png");'>
                </div>
                <div
                    class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/40">
                    <span class="text-white font-medium text-sm">Visualizar</span>
                </div>
                <div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 transition-opacity">
                    <div class="bg-primary text-background-dark rounded-full p-0.5">
                        <span class="material-symbols-outlined text-sm font-bold block">check</span>
                    </div>
                </div>
            </div>
            <p class="text-text-main-light dark:text-white text-sm font-medium mt-2 text-center">Faixa Vermelha</p>
        </label>

        <!-- Template Vertical 2: Prompt / Do zero -->
        <label class="cursor-pointer group relative template-card">
            <input class="peer sr-only" name="template" type="radio" [checked]="selectedTemplateId === 'prompt'"
                (change)="templateSelected.emit('prompt')" />
            <div
                class="relative overflow-hidden rounded-xl border-2 border-border-light dark:border-border-dark peer-checked:border-primary transition-all bg-white dark:bg-surface-card">
                <div
                    class="template-preview aspect-[9/16] bg-gradient-to-br from-primary/10 to-primary/30 flex flex-col items-center justify-center text-center p-4">
                    <span class="material-symbols-outlined text-primary text-3xl mb-2">auto_awesome</span>
                    <span class="text-text-main-light dark:text-white text-xs font-semibold">Gerar via prompt</span>
                    <span class="text-text-secondary-light dark:text-text-secondary text-[10px] mt-1">Do zero com
                        IA</span>
                </div>
                <div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 transition-opacity">
                    <div class="bg-primary text-background-dark rounded-full p-0.5">
                        <span class="material-symbols-outlined text-sm font-bold block">check</span>
                    </div>
                </div>
            </div>
            <p class="text-text-main-light dark:text-white text-sm font-medium mt-2 text-center">Do zero (Prompt)</p>
        </label>
    </div>
    }

    <!-- Templates Horizontais (16:9) -->
    @if (!isVertical) {
    <div class="grid grid-cols-2 gap-4">
        <!-- Template Horizontal 1: YouTube Clássico -->
        <label class="cursor-pointer group relative template-card">
            <input class="peer sr-only" name="template" type="radio"
                [checked]="selectedTemplateId === 'youtube-classico'"
                (change)="templateSelected.emit('youtube-classico')" />
            <div
                class="relative overflow-hidden rounded-xl border-2 border-border-light dark:border-border-dark peer-checked:border-primary transition-all bg-white dark:bg-surface-card">
                <div
                    class="template-preview aspect-video bg-gradient-to-br from-red-600 to-red-800 flex flex-col items-center justify-center opacity-90 peer-checked:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-white text-4xl mb-1">play_circle</span>
                    <span class="text-white text-xs font-semibold">YouTube Style</span>
                </div>
                <div
                    class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/40">
                    <span class="text-white font-medium text-sm">Visualizar</span>
                </div>
                <div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 transition-opacity">
                    <div class="bg-primary text-background-dark rounded-full p-0.5">
                        <span class="material-symbols-outlined text-sm font-bold block">check</span>
                    </div>
                </div>
            </div>
            <p class="text-text-main-light dark:text-white text-sm font-medium mt-2 text-center">YouTube Clássico</p>
        </label>

        <!-- Template Horizontal 2: Gaming -->
        <label class="cursor-pointer group relative template-card">
            <input class="peer sr-only" name="template" type="radio" [checked]="selectedTemplateId === 'gaming'"
                (change)="templateSelected.emit('gaming')" />
            <div
                class="relative overflow-hidden rounded-xl border-2 border-border-light dark:border-border-dark peer-checked:border-primary transition-all bg-white dark:bg-surface-card">
                <div
                    class="template-preview aspect-video bg-gradient-to-br from-purple-600 to-blue-600 flex flex-col items-center justify-center opacity-90 peer-checked:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-white text-4xl mb-1">sports_esports</span>
                    <span class="text-white text-xs font-semibold">Gaming</span>
                </div>
                <div
                    class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/40">
                    <span class="text-white font-medium text-sm">Visualizar</span>
                </div>
                <div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 transition-opacity">
                    <div class="bg-primary text-background-dark rounded-full p-0.5">
                        <span class="material-symbols-outlined text-sm font-bold block">check</span>
                    </div>
                </div>
            </div>
            <p class="text-text-main-light dark:text-white text-sm font-medium mt-2 text-center">Gaming</p>
        </label>

        <!-- Template Horizontal 3: Prompt / Do zero -->
        <label class="cursor-pointer group relative template-card">
            <input class="peer sr-only" name="template" type="radio" [checked]="selectedTemplateId === 'prompt'"
                (change)="templateSelected.emit('prompt')" />
            <div
                class="relative overflow-hidden rounded-xl border-2 border-border-light dark:border-border-dark peer-checked:border-primary transition-all bg-white dark:bg-surface-card">
                <div
                    class="template-preview aspect-video bg-gradient-to-br from-primary/10 to-primary/30 flex flex-col items-center justify-center text-center p-4">
                    <span class="material-symbols-outlined text-primary text-3xl mb-2">auto_awesome</span>
                    <span class="text-text-main-light dark:text-white text-xs font-semibold">Gerar via prompt</span>
                    <span class="text-text-secondary-light dark:text-text-secondary text-[10px] mt-1">Do zero com
                        IA</span>
                </div>
                <div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 transition-opacity">
                    <div class="bg-primary text-background-dark rounded-full p-0.5">
                        <span class="material-symbols-outlined text-sm font-bold block">check</span>
                    </div>
                </div>
            </div>
            <p class="text-text-main-light dark:text-white text-sm font-medium mt-2 text-center">Do zero (Prompt)</p>
        </label>
    </div>
    }

    @if (templateConfig.features.showPromptInput) {
    <div
        class="bg-white dark:bg-surface-card rounded-xl p-5 border border-border-light dark:border-border-dark shadow-sm">
        <div class="flex flex-col gap-2">
            <label class="text-sm font-medium text-text-main-light dark:text-white">Prompt para IA</label>
            <textarea
                class="w-full min-h-[120px] bg-surface-light dark:bg-background-dark border border-border-light dark:border-border-dark rounded-lg px-4 py-3 text-text-main-light dark:text-white placeholder-text-secondary-light/50 dark:placeholder-text-secondary/50 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                placeholder="Descreva a thumbnail que deseja gerar do zero..." [value]="promptText"
                (input)="onPromptChange($any($event.target).value)"></textarea>
        </div>
    </div>
    }

    @if (showEnhanceOption) {
    <div
        class="bg-white dark:bg-surface-card rounded-xl p-5 border border-border-light dark:border-border-dark shadow-sm">
        <div class="flex items-center justify-between gap-4">
            <div>
                <h3 class="text-text-main-light dark:text-white text-sm font-semibold">Aprimorar a imagem com IA</h3>
                <p class="text-text-secondary-light dark:text-text-secondary text-xs">
                    Deixe a imagem com o Tom da sua escolha. Custa +1 crédito.
                </p>
            </div>
            <button (click)="enhanceToggled.emit()"
                class="px-3 py-2 rounded-lg text-sm font-medium border transition-colors border-border-light dark:border-border-dark text-text-main-light dark:text-white"
                [class.border-primary]="enhanceAi" [class.text-primary]="enhanceAi" [class.bg-primary]="enhanceAi">
                {{ enhanceAi ? 'Ativado' : 'Ativar' }}
            </button>
        </div>

        @if (enhanceAi) {
        <div class="mt-5 flex flex-col gap-4">
            <div class="flex flex-col gap-2">
                <label class="text-sm font-medium text-text-main-light dark:text-white">Tom do Vídeo</label>
                <div class="grid gap-3" [ngClass]="isVertical ? 'grid-cols-4' : 'grid-cols-2'">
                    @for (tone of toneOptions; track tone.id) {
                    <button type="button" class="flex flex-col items-center gap-1.5 transition-all"
                        [ngClass]="selectedTone === tone.id ? 'opacity-100' : 'opacity-70 hover:opacity-100'"
                        (click)="onSelectTone(tone.id)">
                        @if (isVertical) {
                        <!-- Phone Frame -->
                        <div class="w-full bg-black rounded-[1rem] border-[4px] overflow-hidden shadow-xl ring-2 aspect-[9/16] transition-all duration-300 relative group/preview"
                            [ngClass]="selectedTone === tone.id ? 'border-primary ring-primary/30' : 'border-slate-700 ring-slate-900/10'">
                            @if (tone.image) {
                            <img [src]="tone.image" [alt]="tone.label" class="w-full h-full object-cover">
                            } @else {
                            <div class="w-full h-full bg-gradient-to-b from-slate-800 to-black"></div>
                            }
                            <div
                                class="absolute inset-0 bg-black/20 group-hover/preview:bg-transparent transition-all duration-300">
                            </div>
                        </div>
                        } @else {
                        <div class="aspect-video w-full rounded-lg border-2 transition-all duration-300"
                            [ngClass]="selectedTone === tone.id ? 'border-primary bg-primary/10' : 'border-slate-700 bg-black'">
                        </div>
                        }
                        <span class="text-[10px] font-medium text-center leading-tight"
                            [ngClass]="selectedTone === tone.id ? 'text-primary' : 'text-text-main-light dark:text-white'">{{
                            tone.label }}</span>
                    </button>
                    }
                </div>
            </div>

            <!-- TO-DO Reativar essa função mais pra frente. -->
            <!-- <div class="flex flex-col gap-2">
                <label class="text-sm font-medium text-text-main-light dark:text-white">Prompt para IA</label>
                <textarea
                    class="w-full min-h-[90px] bg-surface-light dark:bg-background-dark border border-border-light dark:border-border-dark rounded-lg px-4 py-3 text-text-main-light dark:text-white placeholder-text-secondary-light/50 dark:placeholder-text-secondary/50 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                    placeholder="Descreva o ajuste que deseja aplicar..." [value]="promptText"
                    (input)="onPromptChange($any($event.target).value)"></textarea>
            </div> -->
        </div>
        }
    </div>
    }
</div>
